# Conda environment for the HGSC epitype DOWNSTREAM (Python) analyses.
# Integration (scVI/scANVI, CellAssign) IS included in the pipeline (atlas/01); scvi-tools+torch
# are required to re-run it. Re-running is GPU-heavy and optional (integrated object is deposited).
# Version pins follow the manuscript Methods (Claims Ledger §methods).
name: epitype-py
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12.3
  - pip
  # --- core scientific stack ---
  # numpy<2 + numba 0.59 retained for numba's sake: numba 0.59 (the pin below)
  # does not support numpy>=2. anndata 0.12.2 needs numpy>=1.26, so 1.26.4
  # satisfies both. NOTE: the original numpy<2 justification was decoupler 1.4.0's
  # GSVA jit; decoupler is now pinned to 2.x (see below), so that specific reason
  # is stale — the pin now stands on numba 0.59. The numba pin itself (and hence
  # numpy<2) should be re-checked / possibly relaxed (flagged_for_user).
  - numpy=1.26.4
  - numba=0.59
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - pyarrow            # parquet caches (11v2/21/fig_secretory_polarization)
  - pyyaml             # YAML config loader: config/config.py `import yaml` + 6 scripts
  # --- single-cell ---
  - scanpy=1.11.4
  - anndata=0.12.2
  - leidenalg          # Leiden clustering (07_resolution_explorer)
  - python-igraph
  - umap-learn
  - scikit-learn       # GMM (11v4), kmeans, multinomial logistic + AUROC (19_cnv_independence)
  - statsmodels
  - scikit-misc        # scanpy HVG seurat_v3 flavor
  # --- pathway / functional inference ---
  # decoupler 2.x: atlas/04_functional/01 uses the 2.x API (dc.op.{progeny,hallmark,
  # dorothea}, dc.mt.mlm -> adata.obsm["score_mlm"]). The 1.x API (dc.get_progeny,
  # dc.run_mlm, obsm["mlm_estimate"]) is NOT compatible — pin >=2,<3.
  - decoupler>=2,<3    # PROGENy, Hallmark, DoRothEA (MLM)
  # --- survival (python side) ---
  - pip:
      - liana>=1.6.0   # cell-cell communication (14/17b-d)
      - lifelines      # survival_analysis (22c/22d/22f)
      - mygene==3.2.2  # gene-symbol harmonization (atlas construction; upstream)
      - scrublet==0.2.3
      - torch          # REQUIRED by step 21 (scFEA metabolic flux, Fig 2A flux ring / SF8) — 21 does `import torch` at top
      - magic-impute   # scFEA dependency
      # --- integration chain (atlas/01; GPU, optional re-run — see header note) ---
      - scvi-tools>=1.1,<1.3   # scVI/scANVI/MrVI/SysVI (05a-d) + CellAssign (04)
      - scib-metrics>=0.5      # integration benchmark (06_benchmark.py); pulls jax/jaxlib
      # --- figure helpers ---
      - adjustText     # volcano label de-overlap (figure2/03 Fig 2C; README example)
# NOTE (handled separately, flagged for the orchestrator):
#   - scFEA metabolic flux (Fig 2A flux ring, SF8) needs its own torch-based sub-env;
#     vendored at 2026_final_atlas/tools/scFEA. Build `epitype-scfea` only when reaching step 21/Fig2A.
#   - CopyKAT, BayesPrism, RCTD, SingleR, UCell, mgcv, spdep, spatstat, Voyager are R (see renv).
