# Central configuration for the HGSC malignant-states analysis.
# SINGLE SOURCE OF TRUTH for paths, cohort definitions, seeds, and signatures.
# Replaces the hardcoded /Volumes/CookLab/Sarah/... paths from the original analysis.
#
# Override DATA_ROOT / OUTPUT_ROOT via environment variables of the same name,
# or edit here. Point DATA_ROOT at wherever the deposited objects live
# (locally, or the GEO/Zenodo download).

paths:
  # Root holding the large input objects (atlas h5ad, SFE dirs). NOT shipped in the repo.
  data_root:   "${DATA_ROOT:-/Volumes/Nosepass/Epitype_Project}"
  # Where pipeline outputs (tables, intermediate caches, figures) are written.
  output_root: "${OUTPUT_ROOT:-./output}"
  figures_dir: "${OUTPUT_ROOT:-./output}/figures"
  # External organoid (PDO) substrate root (Fig 3). Default lives under data_root;
  # override ORGANOIDS_ROOT (absolute) to point elsewhere. Used via cfg_path("organoids_root", ...).
  organoids_root: "${ORGANOIDS_ROOT:-/Volumes/Nosepass/Epitype_Project/2026_organoids}"

# Entry-point objects (relative to data_root). The integration is included in the repo
# (atlas/01 steps 03–07, the official scVI/scANVI/MrVI/SysVI/Harmony chain run on a GPU);
# these objects are deposited for convenience but are reproducible from raw data via that code.
objects:
  atlas_scanvi:       "2026_final_atlas/hgsc_atlas_scanvi.h5ad"        # integration output (reproducible via atlas/01 steps 03–08; deposited for convenience)
  atlas_celltype_l2:  "2026_final_atlas/hgsc_atlas_celltype_level2.h5ad"
  atlas_final:        "2026_final_atlas/hgsc_atlas_final.h5ad"          # canonical downstream entry-point
  atlas_epithelial:   "2026_final_atlas/hgsc_atlas_epithelial.h5ad"
  atlas_celltype_dir: "2026_final_atlas/celltype_h5ad"                  # per-celltype subsets
  xenium_ref:         "2026_final_atlas/output/xenium_celltype/xenium_celltype_downsampled.h5ad"  # SingleR reference (canonical copy)
  # NOTE on the official integration chain (atlas/01 steps 03–07): its intermediate
  # objects (preprocessed.h5ad, CellAssign predictions, per-method models + embedding
  # NPZs, benchmark tables, integrated_<method>.h5ad) are REGENERATED, not deposited
  # primary inputs, so they are NOT listed here as data_root objects. The scripts write
  # them under output_root/01_preprocess_qc/integration/ via path("output_root", ...).
  # The chain's RAW input is atlas_concatenated_filtered.h5ad (written by step 02 under
  # data_root/2026_final_atlas/processed/), the QC+Scrublet-filtered concatenated counts.
  sfe_tma_filtered:   "2026_final_xenium_analysis/output/sfe/sfe_tma_filtered"   # canonical TMA entry-point
  sfe_dir:            "2026_final_xenium_analysis/output/sfe"
  # NOTE: the organoid (PDO) substrate root is an EXTERNAL input PATH — see
  # paths.organoids_root above. It is NOT a data_root-relative object, so it is
  # deliberately not duplicated here; consumers resolve it via path/cfg_path(
  # "organoids_root", ...) so an absolute ORGANOIDS_ROOT override works in R and
  # Python alike (audit H16 — cfg_obj() doubled the absolute override).
  # Figure-data caches written by the manuscript figure-prep helpers (figures/_prep/).
  # These are intermediate parquet/CSV caches, not deposited primary objects.
  fig_data_dir:       "${FIG_DATA_ROOT:-2026_final_atlas/output/fig_secretory_polarization/data}"
  # ICON7 / GSE140082 bevacizumab external validation (expanded Fig 7; PLACEHOLDER).
  # Per-patient scored cohort + result tables from the ICON7 backend module
  # (2026_final_xenium_analysis/davids side quests/ICON7/). At full migration these
  # move under the deposited bundle; see that module's MIGRATION.md.
  icon7_cohort:       "2026_final_xenium_analysis/davids side quests/ICON7/data/processed/cohort_filtered.tsv"
  icon7_results_dir:  "2026_final_xenium_analysis/davids side quests/ICON7/results/tables"
  # Gene-symbol x sample expression matrix (collapsed from the HumanHT-12 probes by
  # the ICON7 backend 01_prepare.R). Used ONLY by the supplementary confound/robustness
  # script (S1_secb_bev_confound_robustness.R) to UCell-score competing hypoxia/
  # angiogenesis signatures; the main panel needs only icon7_cohort.
  icon7_expr:         "2026_final_xenium_analysis/davids side quests/ICON7/data/processed/expr_gene_symbol.rds"
  # CCLE / DepMap 24Q4 + PRISM 25Q2 SMAC-mimetic side-quest (placeholder figure; David's
  # side-quest). Streamlined to PRISM SMAC mimetics (main) + targeted NF-kB/BIRC3 Chronos
  # (support). Source module: 2026_final_xenium_analysis/davids side quests/ccle_depmap/.
  # ccle_line_scores is the deposited per-line scores cache (read by the 02/03 figure
  # scripts); the raw DepMap/PRISM matrices below are read for the correlations. At full
  # deposit these move under the DATA_ROOT bundle; see that module's MIGRATION.md.
  ccle_line_scores:      "2026_final_xenium_analysis/davids side quests/ccle_depmap/data/processed/hgsc_line_scores.tsv"
  ccle_model_meta:       "2026_final_xenium_analysis/davids side quests/ccle_depmap/data/raw/Model.csv"
  ccle_expression:       "2026_final_xenium_analysis/davids side quests/ccle_depmap/data/raw/OmicsExpressionProteinCodingGenesTPMLogp1.csv"
  ccle_crispr:           "2026_final_xenium_analysis/davids side quests/ccle_depmap/data/raw/CRISPRGeneEffect.csv"
  ccle_prism_auc:        "2026_final_xenium_analysis/davids side quests/ccle_depmap/data/raw/REPURPOSINGAUCMatrix.csv"
  ccle_prism_conditions: "2026_final_xenium_analysis/davids side quests/ccle_depmap/data/raw/REPURPOSINGCollapsedConditions.csv"

# Reproducibility: global seed applied wherever stochastic steps were previously unseeded
# (xenium 06f/06g cell-labeling, ConsensusOV RF, NMF inits, subsampling).
seed: 42

# Published cohort (pin to the preprint; excludes the 2 FTE whole-tissue samples
# added post-preprint that caused cohort drift).
cohort:
  whole_tissue:   [OTB_2384, OTB_2417, OTB_2432, OTB_2454, OTB_2457, OTB_2461, SP24_24824, SP24_25573]
  fte_exclude_wt: [FT1-1, EAOC-1-FTE]   # FTE whole-tissue: NOT part of the published whole-tissue arm
  tma_patients:   97
  fte_tma_cores:  15

# Epithelial polarization schema (canonical = NMF Factor-2 percentile partition).
# Labels standardized: "Intermediate" (was "Transitioning" in some original scripts).
polarization:
  factor: "Factor_2"                 # SecB-defining NMF factor
  partition: {SecA: "<p50", Intermediate: "p50-p75", SecB: ">=p75"}
  labels: [SecA, Intermediate, SecB, Ciliated]
