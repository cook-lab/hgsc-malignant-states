# Canonical gene signatures for SecA/SecB secretory polarization.
# These are the 7-gene cross-platform signatures (noBCAM decision: BCAM dropped from
# SecA because NMF showed it does not reliably mark SecA). Used by atlas UCell scoring
# (18b) and the xenium annotation/polarization chain (06d/06f) for cross-platform consistency.
# Source of truth — referenced by both Python and R scripts (load via yaml).

SecA:   [MECOM, FBXO21, LGR5, LPAR3, PBX1, SOX17, RCN2]
SecB:   [KRT17, KRT19, KRT7, LCN2, PRSS22, SLPI, TACSTD2]

# Full NMF program marker lists (Supp Data 4) and the 37 UCell pathway modules
# (Supp Data 6) are generated by the pipeline and live in tables/ — see
# tables/README.md. Ciliated identity markers (assigned independently of Factor_2):
Ciliated: [FOXJ1, CAPS, RSPH1, TPPP3]
